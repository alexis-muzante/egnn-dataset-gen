[General]
#abstract = true
network = RateControlShowcase

*.*Host.mobility.constraintAreaMinX = 0m
*.*Host.mobility.constraintAreaMinY = 0m
*.*Host.mobility.constraintAreaMinZ = 0m
*.*Host.mobility.constraintAreaMaxX = 1800m
*.*Host.mobility.constraintAreaMaxY = 400m
*.*Host.mobility.constraintAreaMaxZ = 50m
**.mobility.initFromDisplayString = false

*.radioMedium.pathLoss.typename = "FreeSpacePathLoss"
*.radioMedium.obstacleLoss.typename = "DielectricObstacleLoss"
*.radioMedium.backgroundNoise.power = -86dBm
*.*Host.*.arp.typename = "GlobalArp"
*.configurator.addStaticRoutes = false

# environment settings
#*.physicalEnvironment.config = xmldoc("obstacles.xml")
*.physicalEnvironment.spaceMinX = 0m
*.physicalEnvironment.spaceMinY = 0m
*.physicalEnvironment.spaceMinZ = 0m
*.physicalEnvironment.spaceMaxX = 1800m
*.physicalEnvironment.spaceMaxY = 400m
*.physicalEnvironment.spaceMaxZ = 50m


# nic settings
*.*Host.wlan[*].opMode = "g(erp)"
*.*Host.wlan[*].radio.transmitter.power = 10mW
*.*Host.wlan[*].mgmt.typename = "Ieee80211MgmtAdhoc"
*.*Host.wlan[*].agent.typename = ""


**.wlan[*].radio.centerFrequency = 2.4GHz
**.wlan[*].radio.receiver.snirThreshold = 0dB


# application settings
*.*Host.numApps = 2

#*.sourceHost.app[0].typename = "UdpBasicApp"
#*.sourceHost.app[0].destAddresses = "sinkHost"
#*.sourceHost.app[0].destPort = 5000
#*.sourceHost.app[0].messageLength = 1000B
#*.sourceHost.app[0].sendInterval = 0.1ms
#*.sourceHost.app[0].startTime = 20s

#*.sinkHost.app[0].typename = "UdpSink"
#*.sinkHost.app[0].localPort = 5000


## RX HOSTS - Server applications
# RX hosts receive from TX hosts (apps 1 to numTX) - ports 10000+txhost_index
*.sinkHost.app[0].typename = "TcpSinkApp"
*.sinkHost.app[0].localPort = 10000 

## TX HOSTS - Client applications
# TX hosts connect to RX hosts (apps 1 to numRX)
*.sourceHost.app[0].typename = "TcpSessionApp"
*.sourceHost.app[0].sendBytes = 1000MiB
*.sourceHost.app[0].active = true
*.sourceHost.app[0].localPort = 20000
*.sourceHost.app[0].connectAddress = "sinkHost"
*.sourceHost.app[0].connectPort = 10000
*.sourceHost.app[0].tOpen = 100s
*.sourceHost.app[0].tSend = 100s
*.sourceHost.app[0].tClose = -1s 
*.sourceHost.app[0].sendScript = ""


*.*Host.app[1].typename = "Batman"


**.batman.originatorInterval = 1s              # Standard interval
**.batman.broadcastDelay = uniform(0s, 0.08s)  # Reduced collision window  
**.batman.routeTimeout = 20s                   # Shorter timeout for mobility
**.batman.slidingWindowSize = 64               

#**.batman.originatorInterval = 1s              # Standard interval
#**.batman.broadcastDelay = uniform(0s, 0.08s)  # Reduced collision window  
#**.batman.routeTimeout = 20s                   # Shorter timeout for mobility
# **.batman.slidingWindowSize = 64               


# mobility settings
#*.*Host.mobility.typename = "RectangleMobility"
#*.sourceHost.mobility.startPos = 0
#*.sourceHost.mobility.speed = 200mps
#*.sinkHost.mobility.startPos = 3
#*.sinkHost.mobility.speed = 100mps
*.*Host.mobility.typename = "StationaryMobility"
**.sourceHost.mobility.initialX=50m
**.sourceHost.mobility.initialY=200m
**.sinkHost.mobility.initialX= ${10..800 step 20}m
**.sinkHost.mobility.initialY=200m
**.mobility.initFromDisplayString = false

#[Config NoRateControl]
#*.*Host.wlan[*].mac.*.rateControl.typename = ""
#*.*Host.wlan[*].mac.*.rateSelection.dataFrameBitrate = 54Mbps    # use 54Mbps rate when not using rate control

#[Config AarfRateControl]
seed-set = 1    # only for unchanged fingerprints
*.*Host.wlan[*].mac.*.rateControl.typename = "AarfRateControl"
*.*Host.wlan[*].mac.*.rateControl.initialRate = 6Mbps
*.*Host.wlan[*].mac.*.rateSelection.dataFrameBitrate = -1bps   # let ratecontrol set the rate
*.*Host.wlan[*].mac.dcf.rateControl.increaseThreshold = 10
*.*Host.wlan[*].mac.dcf.rateControl.decreaseThreshold = 5
*.*Host.wlan[*].mac.dcf.rateControl.interval = 10s




cmdenv-express-mode = false
cmdenv-event-banners = false

**.app[0].cmdenv-log-level = detail
**.wlan[*].mac.dcf.rateControl.cmdenv-log-level = info     # AarfRateControl rate-change reports

**.*.cmdenv-log-level = off

#**.cmdenv-log-level = off
**.vector-recording = false
**.app[1..].**.scalar-recording = true
**.scalar-recording = false
#**.cmdenv-log-level = off
cmdenv-redirect-output = true
cmdenv-log-prefix = "%t[%l]\t%C for %E: %|"

*.radioMedium.sameTransmissionStartTimeCheck = "ignore"

sim-time-limit = 200s

record-eventlog = false



output-vector-file = "${resultdir}/${configname}-#${runnumber}.vec"
output-scalar-file = "${resultdir}/${configname}-#${runnumber}.sca"
cmdenv-output-file = "${resultdir}/${configname}-#${runnumber}.out"
eventlog-file =      "${resultdir}/${configname}-#${runnumber}.elog"
snapshot-file =      "${resultdir}/${configname}-#${runnumber}.sna"


