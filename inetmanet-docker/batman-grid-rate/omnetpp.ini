[General]
network = BatmanDroneNetwork
repeat = 1

*.numRXHosts = 0
*.numTXHosts = 0
*.numRXTXHosts = 3
*.numRelays = 2

num-rngs = 3
**.mobility.rng-0 = 1
**.wlan[*].mac.rng-0 = 2

# Mobility Configuration
**.rxtxhost[*].mobility.typename = "StationaryMobility"
**.relay[*].mobility.typename = "StationaryMobility"
**.mobility.constraintAreaMinZ = 0m
**.mobility.constraintAreaMaxZ = 0m
**.mobility.constraintAreaMinX = 0m
**.mobility.constraintAreaMinY = 0m
**.mobility.constraintAreaMaxX = 800m
**.mobility.constraintAreaMaxY = 500m
**.mobility.initFromDisplayString = false

# Application configuration
# RXTX hosts: 1 Batman + 2 sinks (one per remote RXTX sender) + 2 sessions (one per remote RXTX target)
*.rxtxhost[*].numApps = 5
*.relay[*].numApps = 1

**.rxtxhost[0].mobility.initialX=50m
**.rxtxhost[0].mobility.initialY=250m
**.rxtxhost[1].mobility.initialX=400m
**.rxtxhost[1].mobility.initialY=140m
**.rxtxhost[2].mobility.initialX=400m
**.rxtxhost[2].mobility.initialY=360m
**.relay[0].mobility.initialX=250m
**.relay[0].mobility.initialY=210m
**.relay[1].mobility.initialX=265m
**.relay[1].mobility.initialY=285m
# Encode position as a scalar index (xi*5 + yi) and require relay1 >= relay0
# This eliminates duplicate (A,B) / (B,A) scenarios cleanly
#constraint = (($r1x)/50 - 1)*5 + (($r1y)/50 - 1) >= (($r0x)/50 - 1)*5 + (($r0y)/50 - 1)
*.radioMedium.pathLoss.typename = "FreeSpacePathLoss"
*.radioMedium.obstacleLoss.typename = "DielectricObstacleLoss"
*.radioMedium.backgroundNoise.power = -86dBm
*.relay[*].*.arp.typename = "GlobalArp"
*.rxtxhost[*].*.arp.typename = "GlobalArp"
*.configurator.addStaticRoutes = false


# tcp settings
**.tcp.typename = "Tcp"
**.tcp.advertisedWindow = 65535                      # in bytes, corresponds with the maximal receiver buffer capacity (Note: normally, NIC queues should be at least this size)
**.tcp.delayedAcksEnabled = false                    # delayed ACK algorithm (RFC 1122) enabled/disabled
**.tcp.nagleEnabled = true                           # Nagle's algorithm (RFC 896) enabled/disabled
**.tcp.limitedTransmitEnabled = false                # Limited Transmit algorithm (RFC 3042) enabled/disabled (can be used for TcpReno/TcpTahoe/TcpNewReno/TcpNoCongestionControl)
**.tcp.increasedIWEnabled = false                    # Increased Initial Window (RFC 3390) enabled/disabled
**.tcp.sackSupport = false                           # Selective Acknowledgment (RFC 2018, 2883, 3517) support (header option) (SACK will be enabled for a connection if both endpoints support it)
**.tcp.windowScalingSupport = false                  # Window Scale (RFC 1323) support (header option) (WS will be enabled for a connection if both endpoints support it)
**.tcp.timestampSupport = false                      # Timestamps (RFC 1323) support (header option) (TS will be enabled for a connection if both endpoints support it)
**.tcp.mss = 1452                                    # Maximum Segment Size (RFC 793) (header option)
**.tcp.tcpAlgorithmClass = "TcpReno"                 # TcpReno/TcpTahoe/TcpNewReno/TcpNoCongestionControl/DumbTcp

# NIC settings

**.wlan[*].mgmt.frameCapacity = 10
**.wlan[*].mac.retryLimit = 7
**.wlan[*].mac.dcf.channelAccess.cwMin = 7
**.wlan[*].mac.cwMinMulticast = 31

**.wlan[*].radio.transmitter.power = 10mW
**.wlan[*].radio.centerFrequency = 2.4GHz
**.wlan[*].opMode = "g(erp)"
**.wlan[*].mgmt.typename = "Ieee80211MgmtAdhoc"
**.wlan[*].agent.typename = ""
**.bitrate=18Mbps


#**.wlan[*].radio.receiver.sensitivity = -85dBm     # Better for drones
#**.wlan[*].radio.receiver.energyDetection = -90dBm # 5dB below sensitivity
**.wlan[*].radio.receiver.snirThreshold = 0dB


#[Config AarfRateControl]
seed-set = 1    # only for unchanged fingerprints
#**.wlan[*].mac.*.rateControl.typename = "AarfRateControl"
#**.wlan[*].mac.*.rateControl.initialRate = 6Mbps
#**.wlan[*].mac.*.rateSelection.multicastFrameBitrate = 6Mbps
#**.wlan[*].mac.*.rateSelection.dataFrameBitrate = -1bps
#**.wlan[*].mac.dcf.rateControl.increaseThreshold = 20
#**.wlan[*].mac.dcf.rateControl.decreaseThreshold = 10
#**.wlan[*].mac.dcf.rateControl.interval = 15s

## RXTX HOSTS - Server applications
# rxtxhost[i].app[k].localPort = 20000 + (i+k)%3  -> skips self, one sink per remote sender
*.rxtxhost[*].app[1..2].typename = "TcpSinkApp"
*.rxtxhost[*].app[1..2].localPort = 20000 + (ancestorIndex(1) + ancestorIndex(0)) % 3

## RXTX HOSTS - Client applications
# rxtxhost[i].app[k] -> rxtxhost[(i+k-2)%3] on port 20000+i  -> skips self
*.rxtxhost[*].app[3..4].typename = "TcpSessionApp"
*.rxtxhost[*].app[3..4].sendBytes = 1000MiB
*.rxtxhost[*].app[3..4].active = true
*.rxtxhost[*].app[3..4].localPort = 20000
*.rxtxhost[*].app[3..4].connectAddress = "rxtxhost[" + string((ancestorIndex(1) + ancestorIndex(0) - 2) % 3) + "]"
*.rxtxhost[*].app[3..4].connectPort = 20000 + ancestorIndex(1)
*.rxtxhost[*].app[3..4].tOpen = 100s + uniform(0s, 1s)
*.rxtxhost[*].app[3..4].tSend = 100s + uniform(0s, 1s)
*.rxtxhost[*].app[3..4].tClose = -1s
*.rxtxhost[*].app[3..4].sendScript = ""


# Routing protocol
*.rxtxhost[*].app[0].typename = "Batman"
*.relay[*].app[0].typename = "Batman"

**.batman.originatorInterval = 1s              # Standard interval
**.batman.broadcastDelay = uniform(0s, 0.08s)  # Reduced collision window  
**.batman.slidingWindowSize = 64               



cmdenv-express-mode = false
cmdenv-event-banners = false

**.*.cmdenv-log-level = off
**.app[0].cmdenv-log-level = detail
**.wlan[*].mac.dcf.rateControl.cmdenv-log-level = info

#**.cmdenv-log-level = off
**.wlan[*].radio.packetErrorRate:vector.vector-recording = true
**.wlan[*].radio.packetErrorRate.result-recording-modes = +vector
**.wlan[*].radio.minSnir:vector.vector-recording = true
**.wlan[*].radio.minSnir.result-recording-modes = +vector
**.vector-recording = false
**.app[1..].**.scalar-recording = true
**.scalar-recording = false
#**.cmdenv-log-level = off
cmdenv-redirect-output = true
cmdenv-log-prefix = "%t[%l]\t%C for %E: %|"

*.radioMedium.sameTransmissionStartTimeCheck = "ignore"

sim-time-limit = 200s



record-eventlog = false

output-vector-file = "${resultdir}/${configname}-#${runnumber}.vec"
output-scalar-file = "${resultdir}/${configname}-#${runnumber}.sca"
cmdenv-output-file = "${resultdir}/${configname}-#${runnumber}.out"
eventlog-file =      "${resultdir}/${configname}-#${runnumber}.elog"
snapshot-file =      "${resultdir}/${configname}-#${runnumber}.sna"


